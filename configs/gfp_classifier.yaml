base: base.yaml
experiment_name: gfp_classifier

model:
  dims: 2d
  encoder: resnext50_32x4d
  encoder_weights: imagenet
  in_channels: 1
  out_channels: 2  # unused (per-head sizes determined from label vocab)
  time_kernel: null

training:
  epochs: 100
  batch_size: 16
  lr: 0.0003
  weight_decay: 0.01
  num_workers: 4
  checkpoint_dir: ckpts/gfp_classifier
  patience: 15
  mixed_precision: true
